name: office_oxide_ffi
description: >
  Unofficial Dart/Flutter FFI bindings for the office_oxide Rust library.
  Not affiliated with Office Oxide or Oxide (oxide.fyi).
version: 0.1.2
# Maintained in fork https://github.com/SuiltaPico/office_oxide (upstream: yfedoseev/office_oxide).
homepage: https://github.com/SuiltaPico/office_oxide
repository: https://github.com/SuiltaPico/office_oxide/tree/main/dart
issue_tracker: https://github.com/SuiltaPico/office_oxide/issues

environment:
  sdk: ^3.10.0
  flutter: ">=3.16.0"

# Build hook: download GitHub Release `native-*` assets on pub get / test / build.
# See https://dart.dev/tools/hooks
hooks:
  user_defines:
    office_oxide_ffi:
      release_repo: SuiltaPico/office_oxide
      release_tag: 0.1.2-dart.1

dependencies:
  code_assets: ^1.2.1
  ffi: ^2.1.4
  flutter:
    sdk: flutter
  hooks: ^2.0.2
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  test: ^1.26.0

flutter:
  plugin:
    platforms:
      android:
        ffiPlugin: true
